pre-commit:
  commands:
    check:
      run: npm run check:fix -- --no-errors-on-unmatched {staged_files}
      glob: "*.{js,cjs,mjs,ts,cts,mts,json,jsonc}"
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint -- --edit {1}

pre-push:
  parallel: true
  commands:
    check:
      run: npm run check -- --no-errors-on-unmatched
    typecheck:
      run: npm run typecheck
    test:
      run: npm run test
